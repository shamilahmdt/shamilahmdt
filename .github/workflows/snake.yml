name: 🐍 Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # runs daily
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent multiple runs overlapping
concurrency:
  group: "snake"
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}

          # Multiple outputs (light + dark + violet theme)
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake-violet.svg?color_snake=#a855f7&color_dots=#0f172a,#1e293b,#334155,#475569,#64748b
            dist/github-snake-violet.gif?color_snake=#a855f7&color_dots=#0f172a,#1e293b,#334155,#475569,#64748b

      - name: 🚀 Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "🐍 update snake animation"