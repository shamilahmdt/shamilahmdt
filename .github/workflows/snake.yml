name: 🐍 Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # runs daily
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent multiple runs overlapping
concurrency:
  group: "snake"
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: shamilahmdt

          # Multiple outputs (light + dark + violet theme)
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake-darkblue.svg?color_snake=#1e3a8a&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39
            dist/github-snake-darkblue.gif?color_snake=#1e3a8a&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39

      - name: 🚀 Push snake animation to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}